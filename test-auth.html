<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Authentification Microsoft - CatzLauncher</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .test-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .test-section {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
        }
        
        .test-section h3 {
            margin-top: 0;
            color: #555;
        }
        
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .config-display {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .log {
            background: #2d3748;
            color: #e2e8f0;
            border-radius: 4px;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 2px 0;
        }
        
        .log-entry.error {
            color: #fc8181;
        }
        
        .log-entry.success {
            color: #68d391;
        }
        
        .log-entry.info {
            color: #63b3ed;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 Test Authentification Microsoft</h1>
        
        <div class="test-section">
            <h3>1. Configuration Azure</h3>
            <button class="btn" onclick="checkAzureConfig()">Vérifier la configuration</button>
            <div id="config-status"></div>
            <div id="config-display" class="config-display" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <h3>2. Test d'authentification</h3>
            <button class="btn" onclick="testAuth()">Tester l'authentification</button>
            <button class="btn" onclick="testManualAuth()">Test manuel</button>
            <div id="auth-status"></div>
        </div>
        
        <div class="test-section">
            <h3>3. Test des utilitaires</h3>
            <button class="btn" onclick="testUtils()">Tester les utilitaires</button>
            <div id="utils-status"></div>
        </div>
        
        <div class="test-section">
            <h3>4. Logs</h3>
            <button class="btn" onclick="clearLogs()">Effacer les logs</button>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script>
        // Simulation de l'environnement Electron
        if (typeof require === 'undefined') {
            window.require = function() {
                return {
                    ipcRenderer: {
                        invoke: async function(channel, ...args) {
                            log(`IPC invoke: ${channel}`, 'info');
                            
                            // Simulation des réponses
                            switch (channel) {
                                case 'check-azure-config':
                                    return {
                                        configured: true,
                                        clientId: '00000000402b5328',
                                        configPath: './azure_config.json'
                                    };
                                case 'microsoft-login':
                                    return {
                                        name: 'TestUser',
                                        email: 'test@example.com',
                                        avatar: 'https://minotar.net/armor/body/steve/120',
                                        uuid: 'test-uuid',
                                        access_token: 'test-token'
                                    };
                                default:
                                    throw new Error(`Channel non supporté: ${channel}`);
                            }
                        },
                        send: function(channel, ...args) {
                            log(`IPC send: ${channel}`, 'info');
                        },
                        once: function(channel, callback) {
                            log(`IPC once: ${channel}`, 'info');
                        }
                    }
                };
            };
        }

        // Fonction de logging
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('log').innerHTML = '';
        }

        function showStatus(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        // Test de la configuration Azure
        async function checkAzureConfig() {
            try {
                log('Vérification de la configuration Azure...', 'info');
                
                if (typeof window.AuthUtils === 'undefined') {
                    showStatus('config-status', 'AuthUtils non disponible', 'error');
                    return;
                }

                const ipcRenderer = require('electron').ipcRenderer;
                const config = await ipcRenderer.invoke('check-azure-config');
                
                const display = document.getElementById('config-display');
                display.style.display = 'block';
                display.textContent = JSON.stringify(config, null, 2);
                
                if (config.configured) {
                    showStatus('config-status', '✅ Configuration Azure valide', 'success');
                    log(`Configuration trouvée: ${config.clientId}`, 'success');
                } else {
                    showStatus('config-status', '❌ Configuration Azure manquante', 'error');
                    log('Configuration Azure non trouvée', 'error');
                }
            } catch (error) {
                showStatus('config-status', `❌ Erreur: ${error.message}`, 'error');
                log(`Erreur de configuration: ${error.message}`, 'error');
            }
        }

        // Test d'authentification
        async function testAuth() {
            try {
                log('Test d\'authentification automatique...', 'info');
                
                if (typeof window.authManager === 'undefined') {
                    showStatus('auth-status', 'authManager non disponible', 'error');
                    return;
                }

                await window.authManager.loginWithMicrosoft();
                showStatus('auth-status', '✅ Test d\'authentification réussi', 'success');
                log('Authentification réussie', 'success');
            } catch (error) {
                showStatus('auth-status', `❌ Erreur d'authentification: ${error.message}`, 'error');
                log(`Erreur d'authentification: ${error.message}`, 'error');
            }
        }

        // Test d'authentification manuelle
        function testManualAuth() {
            try {
                log('Test d\'authentification manuelle...', 'info');
                
                if (typeof window.authManager === 'undefined') {
                    showStatus('auth-status', 'authManager non disponible', 'error');
                    return;
                }

                window.authManager.showManualLoginModal();
                showStatus('auth-status', 'ℹ️ Modale d\'authentification manuelle affichée', 'info');
                log('Modale d\'authentification manuelle affichée', 'info');
            } catch (error) {
                showStatus('auth-status', `❌ Erreur: ${error.message}`, 'error');
                log(`Erreur: ${error.message}`, 'error');
            }
        }

        // Test des utilitaires
        function testUtils() {
            try {
                log('Test des utilitaires d\'authentification...', 'info');
                
                if (typeof window.AuthUtils === 'undefined') {
                    showStatus('utils-status', 'AuthUtils non disponible', 'error');
                    return;
                }

                // Test de validation d'URL
                const testUrl = 'https://login.live.com/oauth20_desktop.srf?code=test123';
                const validation = window.AuthUtils.validateRedirectUrl(testUrl);
                
                if (validation.valid) {
                    log(`Validation d'URL réussie: ${validation.code}`, 'success');
                } else {
                    log(`Validation d'URL échouée: ${validation.error}`, 'error');
                }

                // Test de messages de statut
                const statusMessage = window.AuthUtils.getStatusMessage('xbox_auth');
                log(`Message de statut: ${statusMessage}`, 'info');

                showStatus('utils-status', '✅ Tests des utilitaires réussis', 'success');
            } catch (error) {
                showStatus('utils-status', `❌ Erreur: ${error.message}`, 'error');
                log(`Erreur des utilitaires: ${error.message}`, 'error');
            }
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            log('Page de test chargée', 'info');
            
            // Charger les scripts nécessaires
            const scripts = [
                '../utils/auth-utils.js',
                'scripts/auth.js'
            ];
            
            scripts.forEach(script => {
                const scriptElement = document.createElement('script');
                scriptElement.src = script;
                scriptElement.onload = () => log(`Script chargé: ${script}`, 'success');
                scriptElement.onerror = () => log(`Erreur de chargement: ${script}`, 'error');
                document.head.appendChild(scriptElement);
            });
        });
    </script>
</body>
</html>
